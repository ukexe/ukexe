<svg width="860" height="260" viewBox="0 0 860 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aegis LLM Inference Platform</title>
  <desc id="desc">Animated 3D project card for a Kubernetes and vLLM inference platform.</desc>
  <style>
    .bg { fill: #08111f; }
    .text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e5f3ff; }
    .muted { fill: #9ca3af; }
    .cyan { fill: #38bdf8; }
    .green { fill: #34d399; }
    .box { fill: #111827; stroke: #38bdf8; stroke-width: 1.2; }
    .roof { fill: #1d4ed8; opacity: .72; }
    .side { fill: #0f766e; opacity: .58; }
    .line { stroke: #38bdf8; stroke-width: 2; opacity: .75; }
    .packet { animation: packet 2.8s linear infinite; }
    .cube { animation: lift 4s ease-in-out infinite; transform-origin: center; }
    .cube2 { animation-delay: .55s; }
    .cube3 { animation-delay: 1.1s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes lift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .45; }
      50% { opacity: 1; }
    }
    @keyframes packet {
      0% { offset-distance: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
  </style>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="route" d="M545 80 C620 80 625 135 696 135 C737 135 760 156 790 185"/>
  </defs>
  <rect class="bg" width="860" height="260" rx="26"/>
  <g opacity=".18">
    <circle cx="682" cy="132" r="105" stroke="#38bdf8"/>
    <circle cx="682" cy="132" r="72" stroke="#2dd4bf"/>
    <circle cx="682" cy="132" r="40" stroke="#38bdf8"/>
  </g>
  <g transform="translate(515 58)">
    <g class="cube">
      <path class="roof" d="M22 34L85 10L144 36L80 64Z"/>
      <path class="box" d="M22 34L80 64V124L22 94Z"/>
      <path class="side" d="M80 64L144 36V96L80 124Z"/>
    </g>
    <g class="cube cube2" transform="translate(95 55) scale(.78)">
      <path class="roof" d="M22 34L85 10L144 36L80 64Z"/>
      <path class="box" d="M22 34L80 64V124L22 94Z"/>
      <path class="side" d="M80 64L144 36V96L80 124Z"/>
    </g>
    <g class="cube cube3" transform="translate(-30 96) scale(.72)">
      <path class="roof" d="M22 34L85 10L144 36L80 64Z"/>
      <path class="box" d="M22 34L80 64V124L22 94Z"/>
      <path class="side" d="M80 64L144 36V96L80 124Z"/>
    </g>
  </g>
  <use href="#route" class="line" fill="none"/>
  <circle r="6" fill="#34d399" filter="url(#glow)" class="packet" style="offset-path: path('M545 80 C620 80 625 135 696 135 C737 135 760 156 790 185');"/>
  <circle cx="790" cy="185" r="12" class="green pulse" filter="url(#glow)"/>
  <text x="58" y="62" class="text" font-size="17" letter-spacing="2">FEATURED SYSTEM</text>
  <text x="58" y="95" class="text" font-size="28" font-weight="700">Aegis LLM Inference Platform</text>
  <text x="58" y="128" class="muted text" font-size="15">OpenAI-compatible LLM serving on GPU-aware Kubernetes.</text>
  <text x="58" y="160" class="cyan text" font-size="14">FastAPI · vLLM · Kubernetes · KEDA · Prometheus · Grafana</text>
  <text x="58" y="205" class="muted text" font-size="13">streaming APIs · queue-depth autoscaling · SLO dashboards · GPU telemetry</text>
</svg>
