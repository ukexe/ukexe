<svg width="860" height="260" viewBox="0 0 860 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI-Powered Grievance Management System</title>
  <desc id="desc">Animated 3D project card for a multilingual AI grievance workflow system.</desc>
  <style>
    .bg { fill: #07131f; }
    .text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ecfeff; }
    .muted { fill: #99f6e4; opacity: .78; }
    .cyan { fill: #38bdf8; }
    .teal { fill: #2dd4bf; }
    .card { fill: #102033; stroke: #2dd4bf; stroke-width: 1.2; }
    .side { fill: #0f766e; opacity: .5; }
    .top { fill: #155e75; opacity: .65; }
    .line { stroke: #38bdf8; stroke-width: 2; stroke-dasharray: 8 8; animation: dash 3s linear infinite; }
    .float { animation: float 4.2s ease-in-out infinite; }
    .float2 { animation-delay: .7s; }
    .float3 { animation-delay: 1.4s; }
    .pulse { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -32; } }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .45; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
  </style>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect class="bg" width="860" height="260" rx="26"/>
  <g opacity=".2">
    <path d="M512 216C580 154 650 258 810 112" stroke="#2dd4bf" stroke-width="1"/>
    <path d="M512 185C600 105 655 215 810 80" stroke="#38bdf8" stroke-width="1"/>
  </g>
  <g transform="translate(520 45)">
    <g class="float">
      <path class="top" d="M32 30L150 10L216 43L98 65Z"/>
      <path class="card" d="M32 30L98 65V149L32 112Z"/>
      <path class="side" d="M98 65L216 43V126L98 149Z"/>
      <path d="M54 67H92M54 88H82M54 109H96" stroke="#99f6e4" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g class="float float2" transform="translate(115 62) scale(.72)">
      <path class="top" d="M32 30L150 10L216 43L98 65Z"/>
      <path class="card" d="M32 30L98 65V149L32 112Z"/>
      <path class="side" d="M98 65L216 43V126L98 149Z"/>
      <path d="M54 67H92M54 88H82M54 109H96" stroke="#99f6e4" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g class="float float3" transform="translate(-30 112) scale(.65)">
      <path class="top" d="M32 30L150 10L216 43L98 65Z"/>
      <path class="card" d="M32 30L98 65V149L32 112Z"/>
      <path class="side" d="M98 65L216 43V126L98 149Z"/>
      <path d="M54 67H92M54 88H82M54 109H96" stroke="#99f6e4" stroke-width="5" stroke-linecap="round"/>
    </g>
    <path class="line" d="M110 118C162 98 196 113 246 75" fill="none"/>
    <circle cx="246" cy="75" r="13" class="teal pulse" filter="url(#glow)"/>
    <path d="M240 75L245 81L256 67" stroke="#06221f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="58" y="62" class="text" font-size="17" letter-spacing="2">FEATURED SYSTEM</text>
  <text x="58" y="95" class="text" font-size="27" font-weight="700">AI-Powered Grievance Management</text>
  <text x="58" y="128" class="muted text" font-size="15">Multilingual complaint intake, workflow tracking, and admin operations.</text>
  <text x="58" y="160" class="cyan text" font-size="14">TypeScript · Next.js · Supabase · PostgreSQL · OCR · PWA</text>
  <text x="58" y="205" class="muted text" font-size="13">classification · Tamil/English support · realtime updates · role-based access</text>
</svg>
